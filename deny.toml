[graph]
all-features = true

[advisories]
db-path = "target/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "MIT",
    "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

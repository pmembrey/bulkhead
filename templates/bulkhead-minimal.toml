name = "Bulkhead Minimal Sandbox"
workspace_folder = "/workspace"
remote_user = "__BULKHEAD_REMOTE_USER__"
agents = []

features = ["ghcr.io/devcontainers/features/github-cli:1"]
run_args = []

[build]
dockerfile = ".devcontainer/Dockerfile"
context = ".devcontainer"

[git]
enabled = false

[build_args]
TZ = "${localEnv:TZ:UTC}"

[container_env]
NPM_CONFIG_IGNORE_SCRIPTS = "true"
NPM_CONFIG_AUDIT = "true"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_SAVE_EXACT = "true"
NPM_CONFIG_UPDATE_NOTIFIER = "false"
NPM_CONFIG_MINIMUM_RELEASE_AGE = "1440"
PIP_DISABLE_PIP_VERSION_CHECK = "1"
PYTHONDONTWRITEBYTECODE = "1"
UV_LINK_MODE = "copy"

[[volume]]
name = "history"
target = "/commandhistory"

# Minimal preset:
# - current directory is writable in-container
# - no extra host bind mounts are added by default
# - set `agents = ["claude", "codex", "pi"]` to preinstall supported agent CLIs
# - useful when you want the smallest host footprint
# - `[build]` can be redirected to another Dockerfile and build context in the repo
# - Bulkhead still adds read-only mounts for `.devcontainer` and `bulkhead.toml`
# - extra mounts cannot target those managed config paths or their descendants
# - writable extra mounts must use plain host paths, not devcontainer variables
